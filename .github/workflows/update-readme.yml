name: Update profile README

on:
  schedule:
    # Weekly: refresh repo-derived language weights
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_profile_readme.py"
      - ".github/workflows/update-readme.yml"

permissions:
  contents: write

jobs:
  refresh-tech-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate languages from public repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python3 scripts/update_profile_readme.py

      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore: refresh profile tech stack from GitHub API"
            git push
          fi
